openapi: 3.0.0

info:
  title: Travel Planner API
  version: 1.0.0
  description: Full CRUD API with JWT authentication (Trips, Destinations, Activities)

servers:
  - url: https://travel-planner-api-1pcn.onrender.com

# ================= COMPONENTS =================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string

    Trip:
      type: object
      required:
        - title
        - startDate
        - endDate
        - budget
      properties:
        id:
          type: integer
        title:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budget:
          type: number
        userId:
          type: integer

    Destination:
      type: object
      required:
        - city
        - country
        - visitDate
        - tripId
      properties:
        id:
          type: integer
        city:
          type: string
        country:
          type: string
        visitDate:
          type: string
          format: date
        notes:
          type: string
        tripId:
          type: integer

    Activity:
      type: object
      required:
        - name
        - activityDate
        - activityTime
        - estimatedCost
        - destinationId
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        activityDate:
          type: string
          format: date
        activityTime:
          type: string
        estimatedCost:
          type: number
        destinationId:
          type: integer

security:
  - bearerAuth: []

# ================= PATHS =================
paths:

# ================= AUTH =================

  /api/auth/signup:
    post:
      security: []
      summary: User signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        "201":
          description: User created
        "400":
          description: Invalid input
        "409":
          description: User already exists

  /api/auth/login:
    post:
      security: []
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login success
        "400":
          description: Invalid credentials

# ================= TRIPS =================

  /api/trips:
    post:
      summary: Create trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Trip'
      responses:
        "201":
          description: Trip created
        "400":
          description: Bad Request
        "401":
          description: Unauthorized

    get:
      summary: Get all trips
      responses:
        "200":
          description: Success
        "401":
          description: Unauthorized

  /api/trips/{id}:
    get:
      summary: Get trip by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
        "403":
          description: Forbidden
        "404":
          description: Not Found

    put:
      summary: Update trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                budget:
                  type: number
      responses:
        "200":
          description: Updated
        "403":
          description: Forbidden
        "404":
          description: Not Found

    delete:
      summary: Delete trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
        "404":
          description: Not Found

# ================= DESTINATIONS =================

  /api/destinations:
    post:
      summary: Create destination
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Destination'
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

    get:
      summary: Get all destinations
      responses:
        "200":
          description: Success
        "401":
          description: Unauthorized

  /api/destinations/{id}:
    get:
      summary: Get destination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
        "403":
          description: Forbidden
        "404":
          description: Not Found

    put:
      summary: Update destination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                city:
                  type: string
                country:
                  type: string
                visitDate:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        "200":
          description: Updated

    delete:
      summary: Delete destination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
        "404":
          description: Not Found

# ================= ACTIVITIES =================

  /api/activities:
    post:
      summary: Create activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activity'
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized

    get:
      summary: Get all activities
      responses:
        "200":
          description: Success

  /api/activities/{id}:
    get:
      summary: Get activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
        "404":
          description: Not Found

    put:
      summary: Update activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                activityDate:
                  type: string
                  format: date
                activityTime:
                  type: string
                estimatedCost:
                  type: number
      responses:
        "200":
          description: Updated

    delete:
      summary: Delete activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found