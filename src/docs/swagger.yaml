openapi: 3.0.0

info:
  title: Travel Planner API
  version: 1.0.0
  description: Full CRUD API with JWT authentication (Trips, Destinations, Activities)

servers:
  - url: https://travel-planner-api-1pcn.onrender.com

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

# ================= SCHEMAS =================
components:
  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }

    Trip:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        budget: { type: number }
        userId: { type: integer }

    Destination:
      type: object
      properties:
        id: { type: integer }
        city: { type: string }
        country: { type: string }
        visitDate: { type: string, format: date }
        notes: { type: string }
        tripId: { type: integer }

    Activity:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        activityDate: { type: string, format: date }
        activityTime: { type: string }
        estimatedCost: { type: number }
        destinationId: { type: integer }

# ================= AUTH =================

paths:

  /api/auth/signup:
    post:
      security: []
      summary: User signup
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Alice
              email: alice@test.com
              password: Password123
      responses:
        "201":
          description: User created
        "400":
          description: Bad Request
          content:
            application/json:
              example:
                message: Invalid input
        "409":
          description: Conflict
          content:
            application/json:
              example:
                message: User already exists

  /api/auth/login:
    post:
      security: []
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            example:
              email: alice@test.com
              password: Password123
      responses:
        "200":
          description: Login success
          content:
            application/json:
              example:
                token: jwt_token_here
                user:
                  id: 1
                  email: alice@test.com
        "401":
          description: Unauthorized

# ================= TRIPS =================

  /api/trips:
    post:
      summary: Create trip
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Europe Trip
              startDate: 2026-07-01
              endDate: 2026-07-10
              budget: 5000
      responses:
        "201":
          description: Trip created
          content:
            application/json:
              example:
                id: 1
                title: Europe Trip
                budget: 5000
        "400":
          description: Bad Request
        "401":
          description: Unauthorized

    get:
      summary: Get all trips
      responses:
        "200":
          description: Success
          content:
            application/json:
              example:
                - id: 1
                  title: Europe Trip
        "401":
          description: Unauthorized

  /api/trips/{id}:
    get:
      summary: Get trip by ID
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200":
          description: Success
        "403":
          description: Forbidden
        "404":
          description: Not Found

    put:
      summary: Update trip
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            example:
              title: Updated Trip
              budget: 9999
      responses:
        "200":
          description: Updated
        "403":
          description: Forbidden
        "404":
          description: Not Found

    delete:
      summary: Delete trip
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
        "404":
          description: Not Found

# ================= DESTINATIONS =================

  /api/destinations:
    post:
      summary: Create destination
      requestBody:
        required: true
        content:
          application/json:
            example:
              city: Paris
              country: France
              visitDate: 2026-07-01
              tripId: 1
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

    get:
      summary: Get all destinations
      responses:
        "200":
          description: Success
          content:
            application/json:
              example:
                - id: 1
                  city: Paris
        "401":
          description: Unauthorized

  /api/destinations/{id}:
    get:
      summary: Get destination
      parameters:
        - name: id
          in: path
      responses:
        "200":
          description: Success
        "403":
          description: Forbidden
        "404":
          description: Not Found

    put:
      summary: Update destination
      parameters:
        - name: id
          in: path
      requestBody:
        required: true
        content:
          application/json:
            example:
              city: London
      responses:
        "200":
          description: Updated

    delete:
      summary: Delete destination
      parameters:
        - name: id
          in: path
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
        "404":
          description: Not Found

# ================= ACTIVITIES =================

  /api/activities:
    post:
      summary: Create activity
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: Eiffel Visit
              activityDate: 2026-07-01
              activityTime: "10:00"
              estimatedCost: 100
              destinationId: 1
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized

    get:
      summary: Get all activities
      responses:
        "200":
          description: Success

  /api/activities/{id}:
    get:
      summary: Get activity
      parameters:
        - name: id
          in: path
      responses:
        "200":
          description: Success
        "404":
          description: Not Found

    put:
      summary: Update activity
      parameters:
        - name: id
          in: path
      responses:
        "200":
          description: Updated

    delete:
      summary: Delete activity
      parameters:
        - name: id
          in: path
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found