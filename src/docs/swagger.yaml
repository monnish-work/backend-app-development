openapi: 3.0.0

info:
  title: Travel Planner API
  version: 1.0.0
  description: Full CRUD API with JWT authentication (Trips, Destinations, Activities)

servers:
  - url: http://localhost:3000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string

    Trip:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budget:
          type: number
        userId:
          type: integer

    Destination:
      type: object
      properties:
        id:
          type: integer
        city:
          type: string
        country:
          type: string
        visitDate:
          type: string
          format: date
        notes:
          type: string
        tripId:
          type: integer

    Activity:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        activityDate:
          type: string
          format: date
        activityTime:
          type: string
        estimatedCost:
          type: number
        destinationId:
          type: integer

security:
  - bearerAuth: []

paths:

  # ================= AUTH =================

  /api/auth/signup:
    post:
      security: []
      summary: User signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: User1
                email:
                  type: string
                  example: user@test.com
                password:
                  type: string
                  example: Password123
      responses:
        "201":
          description: User created successfully
        "400":
          description: Validation error
        "409":
          description: User already exists

  /api/auth/login:
    post:
      security: []
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
        "401":
          description: Invalid credentials

  # ================= TRIPS =================

  /api/trips:
    post:
      summary: Create trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, startDate, endDate, budget]
              properties:
                title:
                  type: string
                  example: Goa Trip
                startDate:
                  type: string
                  format: date
                  example: 2026-06-01
                endDate:
                  type: string
                  format: date
                  example: 2026-06-10
                budget:
                  type: number
                  example: 2000
      responses:
        "201":
          description: Trip created
        "401":
          description: Unauthorized

    get:
      summary: Get all trips (user scoped)
      responses:
        "200":
          description: Success
        "401":
          description: Unauthorized

  /api/trips/{id}:
    get:
      summary: Get trip by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
        "403":
          description: Forbidden
        "404":
          description: Not found

    put:
      summary: Update trip
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                budget:
                  type: number
      responses:
        "200":
          description: Updated
        "403":
          description: Forbidden

    delete:
      summary: Delete trip
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200":
          description: Deleted
        "403":
          description: Forbidden

  # ================= DESTINATIONS =================

  /api/destinations:
    post:
      summary: Create destination
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [city, country, visitDate, tripId]
              properties:
                city:
                  type: string
                  example: Goa
                country:
                  type: string
                  example: India
                visitDate:
                  type: string
                  format: date
                  example: 2026-06-02
                notes:
                  type: string
                  example: Beach trip
                tripId:
                  type: integer
                  example: 1
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

    get:
      summary: Get all destinations
      responses:
        "200":
          description: Success
        "401":
          description: Unauthorized

  /api/destinations/{id}:
    get:
      summary: Get destination by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
        "403":
          description: Forbidden
        "404":
          description: Not found

    put:
      summary: Update destination
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                city:
                  type: string
                country:
                  type: string
                visitDate:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        "200":
          description: Updated

    delete:
      summary: Delete destination
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200":
          description: Deleted

  # ================= ACTIVITIES =================

  /api/activities:
    post:
      summary: Create activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, activityDate, activityTime, estimatedCost, destinationId]
              properties:
                name:
                  type: string
                  example: Beach Walk
                description:
                  type: string
                  example: Morning walk
                activityDate:
                  type: string
                  format: date
                  example: 2026-06-03
                activityTime:
                  type: string
                  example: "09:00"
                estimatedCost:
                  type: number
                  example: 100
                destinationId:
                  type: integer
                  example: 1
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

    get:
      summary: Get all activities
      responses:
        "200":
          description: Success
        "401":
          description: Unauthorized

  /api/activities/{id}:
    get:
      summary: Get activity by ID
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200":
          description: Success
        "403":
          description: Forbidden
        "404":
          description: Not found

    put:
      summary: Update activity
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                activityDate:
                  type: string
                  format: date
                activityTime:
                  type: string
                estimatedCost:
                  type: number
      responses:
        "200":
          description: Updated

    delete:
      summary: Delete activity
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200":
          description: Deleted